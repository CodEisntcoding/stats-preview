<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap"
    rel="stylesheet">

  <title>Frontend Mentor | Stats preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    * {
      padding: 0;
      box-sizing: border-box;
      margin: 0;
    }

    main {
      font-family: "Inter", sans-serif;
      font-size: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      background-color: hsl(233, 47%, 7%);
      color: white;
    }

    .card {
      display: flex;
      overflow: hidden;
      border-radius: 5px;
      max-width: 1100px;
    }

    .img {

      background: url("image-header-desktop.jpg");
      background-size: cover;
      background-repeat: no-repeat;
      position: relative;
      background-position: center;
      min-height: 300px;
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 25px;
      line-height: 1.5;
    }

    .cont {
      display: flex;
      flex-direction: column;
      gap: 30px;
      background-color: hsl(244, 37%, 16%);
      padding: 3rem;
    }

    .accent {
      background-color: hsl(277, 64%, 61%);
      position: absolute;
      inset: 0;
      mix-blend-mode: multiply;
    }

    h1 {
      font-family: "Lexend Deca", sans-serif;
      font-size: 26px;
    }

    h1 span {
      color: hsl(277, 64%, 61%);
    }

    .cont p,
    footer p {
      color: hsla(0, 0%, 100%, 0.6);
    }

    .cont,
    .img {
      width: 50%;

    }

    footer p {
      text-transform: uppercase;
      font-size: small;
    }

    footer div {
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    footer {
      display: flex;
      justify-content: space-between;
    }

    @media (max-width:768px) {
      .card {
        flex-direction: column-reverse;
        text-align: center;
        max-width: 350px;

      }

      .cont {
        padding: 2rem;
        width: 100%;
      }

      .img {
        background: url("image-header-mobile.jpg");
        background-size: cover;
        background-position: center;
        width: 100%;
min-height: 250px;
      }

      footer {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="card">
      <div class="cont">
        <div class="content">
          <h1>Get <span>insights</span> that help your business grow.</h1>
          <p>Discover the benefits of data analytics and make better decisions regarding revenue, customer
            experience, and overall efficiency.</p>
        </div>
        <footer>
          <div><b style="font-size: larger;">314</b>
            <p>templates</p>
          </div>
          <div><b style="font-size: larger;">10k+</b>
            <p>companies</p>
          </div>
          <div><b style="font-size: larger;">12m+</b>
            <p>queries</p>
          </div>
        </footer>
      </div>
      <div class="img">
        <div class="accent"></div>
      </div>
    </div>
  </main>
</body>

</html>
